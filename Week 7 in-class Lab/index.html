<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Week 7 | Java?</title>
</head>
<body>
    
    <h1>Week 7 | Holy crap im in JavaScript</h1>
    <br>
    <h2>Current Number</h2>
    <h2 id="number">0</h2>

    <input type="button" id="increment" value="Increment">
    <input type="button" id="decrement" value="Decrement">

    <br>

    <hr>
    <h2>The Best Joke In The World</h2>
    
    <div id="jokeContainer">
        <div id="theJoke">
            <h3>Where Does a Polar Bear Store it's money?</h3>
        </div>

        <div id="jokeAnswer">

        </div>
        <input type="button" id="giveAnswer" value="Where?">
    </div>  

    <script>

        var numberText = document.querySelector("#number")

        var incrementbutton = document.querySelector("#increment")
        var decrementbutton = document.querySelector("#decrement")

        var currentNumber = 0

        function add()
        {
            currentNumber++
            // displaying it on HTML
            numberText.innerHTML=currentNumber
        }

        function subtract()
        {
            currentNumber--
            // displaying it on HTML
            numberText.innerHTML=currentNumber
        }

        // Adding an event listener
        // The first value is the event
        // The second value is the function to call
        incrementbutton.addEventListener("click", add)
        decrementbutton.addEventListener("click", subtract)



        var answerContainer = document.querySelector("#jokeAnswer")
        var answerButton = document.querySelector("#giveAnswer")

        function giveAnswer()
        {
            answerContainer.innerHTML += "<h4>The Show Bank!<h4>"
        }

        answerButton.addEventListener("click", giveAnswer)
    </script>
</body>
</html>
